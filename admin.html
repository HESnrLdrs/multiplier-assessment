<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Results - Navigate Transition</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin: 0;
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: white;
            color: #667eea;
        }
        
        .content {
            padding: 40px;
        }
        
        /* Login Screen */
        .login-screen {
            text-align: center;
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .login-screen h2 {
            color: #667eea;
            margin-bottom: 30px;
        }
        
        .login-form input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-form button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-form button:hover {
            transform: translateY(-2px);
        }
        
        .error-message {
            color: #e74c3c;
            margin-top: 15px;
            display: none;
        }
        
        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: 700;
        }
        
        /* Results Table */
        .table-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        tbody tr:hover {
            background: #f8f9fa;
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        .score {
            font-weight: 600;
            font-size: 1.1em;
        }
        
        .score.red {
            color: #e74c3c;
        }
        
        .score.amber {
            color: #f39c12;
        }
        
        .score.green {
            color: #27ae60;
        }
        
        .constraint-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #e74c3c;
            color: white;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .view-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .view-btn:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        
        .export-btn {
            padding: 12px 24px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            background: #229954;
            transform: translateY(-2px);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <h2>Admin Access</h2>
        <div class="login-form">
            <input type="password" id="admin-password" placeholder="Enter admin password" />
            <button onclick="checkPassword()">Login</button>
            <div class="error-message" id="error-message">Incorrect password</div>
        </div>
    </div>
    
    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="container" style="display: none;">
        <div class="header">
            <h1>Assessment Results</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <div class="content">
            <div class="stats" id="stats">
                <div class="stat-card">
                    <h3>Total Assessments</h3>
                    <div class="value" id="total-assessments">0</div>
                </div>
                <div class="stat-card">
                    <h3>Red Constraints</h3>
                    <div class="value" id="red-count">0</div>
                </div>
                <div class="stat-card">
                    <h3>Amber Scores</h3>
                    <div class="value" id="amber-count">0</div>
                </div>
                <div class="stat-card">
                    <h3>All Green</h3>
                    <div class="value" id="green-count">0</div>
                </div>
            </div>
            
            <button class="export-btn" onclick="exportToCSV()">📥 Export to CSV</button>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Date</th>
                            <th>M</th>
                            <th>L</th>
                            <th>I</th>
                            <th>Constraint</th>
                            <th>Capacity</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="results-table">
                        <tr>
                            <td colspan="9" class="loading">
                                <div class="spinner"></div>
                                <p>Loading results...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCmnYEq0hf9QyNjbhej6ghdM2LAzWLGaPA",
            authDomain: "multiplier-assessment.firebaseapp.com",
            databaseURL: "https://multiplier-assessment-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "multiplier-assessment",
            storageBucket: "multiplier-assessment.firebasestorage.app",
            messagingSenderId: "696632883081",
            appId: "1:696632883081:web:3b5ced9d2e85bb54999358"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let allResults = [];
        
        // Admin password (change this to your preferred password)
        const ADMIN_PASSWORD = 'navigate2025';
        
        function checkPassword() {
            const password = document.getElementById('admin-password').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                loadResults();
            } else {
                document.getElementById('error-message').style.display = 'block';
            }
        }
        
        // Allow Enter key to submit password
        document.getElementById('admin-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
        
        function logout() {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('admin-dashboard').style.display = 'none';
            document.getElementById('admin-password').value = '';
            document.getElementById('error-message').style.display = 'none';
        }
        
        async function loadResults() {
            try {
                const usersSnapshot = await database.ref('users').once('value');
                const assessmentsSnapshot = await database.ref('assessments').once('value');
                
                const users = usersSnapshot.val() || {};
                const assessments = assessmentsSnapshot.val() || {};
                
                allResults = [];
                
                // Combine user data with their latest assessment
                Object.keys(assessments).forEach(userId => {
                    const userAssessments = assessments[userId];
                    const assessmentArray = Object.values(userAssessments);
                    const latestAssessment = assessmentArray[assessmentArray.length - 1];
                    
                    const user = users[userId] || {};
                    
                    allResults.push({
                        userId: userId,
                        name: user.name || 'Unknown',
                        email: user.email || 'No email',
                        timestamp: latestAssessment.timestamp,
                        motivation: parseFloat(latestAssessment.motivationDisplay),
                        learning: parseFloat(latestAssessment.learningDisplay),
                        identity: parseFloat(latestAssessment.identityDisplay),
                        capacityScore: latestAssessment.capacityScore,
                        constraint: latestAssessment.constraint
                    });
                });
                
                // Sort by date (newest first)
                allResults.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                displayResults();
                updateStats();
                
            } catch (error) {
                console.error('Error loading results:', error);
                document.getElementById('results-table').innerHTML = `
                    <tr><td colspan="9" class="no-data">Error loading results. Please refresh the page.</td></tr>
                `;
            }
        }
        
        function getScoreColor(score) {
            if (score < 4.0) return 'red';
            if (score < 7.0) return 'amber';
            return 'green';
        }
        
        function displayResults() {
            const tbody = document.getElementById('results-table');
            
            if (allResults.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="no-data">No assessments completed yet.</td></tr>';
                return;
            }
            
            tbody.innerHTML = allResults.map(result => {
                const date = new Date(result.timestamp).toLocaleDateString('en-GB', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric'
                });
                
                const mColor = getScoreColor(result.motivation);
                const lColor = getScoreColor(result.learning);
                const iColor = getScoreColor(result.identity);
                
                return `
                    <tr>
                        <td><strong>${result.name}</strong></td>
                        <td>${result.email}</td>
                        <td>${date}</td>
                        <td class="score ${mColor}">${result.motivation.toFixed(1)}</td>
                        <td class="score ${lColor}">${result.learning.toFixed(1)}</td>
                        <td class="score ${iColor}">${result.identity.toFixed(1)}</td>
                        <td><span class="constraint-badge">${result.constraint.toUpperCase()}</span></td>
                        <td><strong>${result.capacityScore}</strong></td>
                        <td>
                            <a href="results.html?m=${result.motivation}&l=${result.learning}&i=${result.identity}&uid=${result.userId}" 
                               target="_blank" class="view-btn">View Full Results</a>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function updateStats() {
            document.getElementById('total-assessments').textContent = allResults.length;
            
            let redCount = 0;
            let amberCount = 0;
            let greenCount = 0;
            
            allResults.forEach(result => {
                const hasRed = result.motivation < 4.0 || result.learning < 4.0 || result.identity < 4.0;
                const hasAmber = (result.motivation >= 4.0 && result.motivation < 7.0) || 
                                 (result.learning >= 4.0 && result.learning < 7.0) || 
                                 (result.identity >= 4.0 && result.identity < 7.0);
                const allGreen = result.motivation >= 7.0 && result.learning >= 7.0 && result.identity >= 7.0;
                
                if (hasRed) redCount++;
                else if (hasAmber) amberCount++;
                else if (allGreen) greenCount++;
            });
            
            document.getElementById('red-count').textContent = redCount;
            document.getElementById('amber-count').textContent = amberCount;
            document.getElementById('green-count').textContent = greenCount;
        }
        
        function exportToCSV() {
            if (allResults.length === 0) {
                alert('No data to export');
                return;
            }
            
            const headers = ['Name', 'Email', 'Date', 'Motivation', 'Learning', 'Identity', 'Constraint', 'Capacity Score'];
            
            const rows = allResults.map(result => {
                const date = new Date(result.timestamp).toLocaleDateString('en-GB');
                return [
                    result.name,
                    result.email,
                    date,
                    result.motivation.toFixed(1),
                    result.learning.toFixed(1),
                    result.identity.toFixed(1),
                    result.constraint,
                    result.capacityScore
                ];
            });
            
            const csvContent = [
                headers.join(','),
                ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `assessment-results-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
